<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Blog</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My GitHub Blog</h1>
        <nav class="categories">
            <ul>
            </ul>
        </nav>
    </header>

    <main>
        <section class="posts">
            <div class="card">
                <h3>Post Title 1</h3>
                <p>This is a brief description of the post.</p>
                <a href="#">Read More</a>
            </div>
            <div class="card">
                <h3>Post Title 2</h3>
                <p>This is a brief description of the post.</p>
                <a href="#">Read More</a>
            </div>
            <div class="card">
                <h3>Post Title 3</h3>
                <p>This is a brief description of the post.</p>
                <a href="#">Read More</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 My GitHub Blog. All rights reserved.</p>
    </footer>

    <script>
        // 카테고리 목록을 동적으로 생성하는 스크립트
        fetch('/posts/categories.json')
        .then(response => response.json())
        .then(data => {
            const nav = document.querySelector('.categories ul');
            data.categories.forEach(category => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="#">${category}</a>`;
                nav.appendChild(li);
            });
        });
    </script>
</body>
</html>
